name: Build Unsigned iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Project Source Code
        uses: actions/checkout@v4

      - name: Configure Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configure Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Download Flutter Dependencies
        run: flutter pub get

      - name: Install iOS CocoaPods Dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Compile App Bundle
        run: |
          # Build unsigned app bundle for SideStore
          flutter build ios --release --no-codesign

      - name: Verify App Bundle
        run: |
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App bundle not found at $APP_PATH"
            exit 1
          fi
          echo "App bundle exists at $APP_PATH"
          echo "Contents:"
          ls -la "$APP_PATH"
          echo "Frameworks:"
          ls -la "$APP_PATH/Frameworks" 2>/dev/null || echo "No Frameworks dir"

      - name: Package IPA
        run: |
          cd ios
          mkdir -p Payload
          cp -r ../build/ios/Release-iphoneos/Runner.app Payload/
          zip -r ../build/ios/Runner.ipa Payload/
          rm -rf Payload

      - name: Verify IPA
        run: |
          if [ ! -f "build/ios/Runner.ipa" ]; then
            echo "ERROR: IPA not found"
            exit 1
          fi
          echo "IPA size: $(ls -lh build/ios/Runner.ipa | awk '{print $5}')"
          unzip -l build/ios/Runner.ipa | head -20

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-app-unsigned
          path: build/ios/Runner.ipa
          if-no-files-found: error